# Proposal / Stage tools → delivery scripts (relative to DELIVERY_ROOT)
# Keep in sync with backends/delivery/client.py SCRIPT_MAP and
# backends/delivery/registry.py STAGE_RAW_WHITELIST.

predict_interaction:
  script: agent/backbone/predict_api.py
  conda_env: rhobind
  registry_name: rhobind_predict

get_known_rbp_list:
  # local JSON read via backends.delivery.env.load_rbp_registry
  type: local_json
  path: agent_db/registry/rbp_registry.json

seq_similarity:
  primary:
    script: agent/tools/sequence/esm_similarity.py
    conda_env: protein_embed
    registry_name: esm_similarity
  secondary:
    script: agent/tools/sequence/protein_seq_similarity.py
    conda_env: rna
    registry_name: protein_seq_similarity

struct_similarity:
  primary:
    script: agent/tools/structure/struct_similarity_foldseek.py
    conda_env: protein_embed
    registry_name: struct_similarity_foldseek
  refine:
    script: agent/tools/structure/struct_align_usalign.py
    conda_env: protein_embed
    registry_name: struct_align_usalign

get_func_annotation:
  network:
    script: agent/tools/function/uniprot_annotation.py
    registry_name: uniprot_annotation
  offline:
    script: agent/tools/function/go_pfam_lookup.py
    registry_name: go_pfam_lookup

predict_structure:
  script: agent/tools/structure/structure_predict_af3.py
  conda_env: af3
  registry_name: structure_predict_af3

literature_search:
  script: agent/tools/function/literature_retrieval.py
  registry_name: literature_retrieval

# Extra delivery tools useful for Stage 1 (not in proposal table but in DESIGN)
domain_architecture:
  script: agent/tools/sequence/domain_architecture.py
  registry_name: domain_architecture

resolve_rbp:
  script: agent/tools/utility/resolve_rbp.py
  registry_name: resolve_rbp

structure_fetch:
  script: agent/tools/structure/structure_fetch.py
  registry_name: structure_fetch

rna_preprocess:
  script: agent/tools/backbone/rna_preprocess.py
  registry_name: rna_preprocess

similarity_weighted_vote:
  script: agent/tools/integrate/similarity_weighted_vote.py
  registry_name: similarity_weighted_vote

transfer_prior_lookup:
  script: agent/tools/integrate/transfer_prior_lookup.py
  registry_name: transfer_prior_lookup

donor_quality_prior:
  script: agent/tools/integrate/donor_quality_prior.py
  registry_name: donor_quality_prior

confidence_abstain:
  script: agent/tools/integrate/confidence_abstain.py
  registry_name: confidence_abstain
